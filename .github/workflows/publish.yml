name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - awx
          - github
          - gitlab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Enforce publish from master only
        run: |
          if [ "$GITHUB_REF" != "refs/heads/master" ]; then
            echo "ERROR: Publishing is only allowed from the master branch." >&2
            echo "Current ref: $GITHUB_REF" >&2
            echo "Switch to master and re-trigger this workflow." >&2
            exit 1
          fi
          echo "Branch check passed: publishing from master"

      - name: Map package input to workspace
        id: map
        run: |
          case "${{ github.event.inputs.package }}" in
            awx)
              echo "workspace_name=@weiyentan/opencode-plugin-awx" >> $GITHUB_OUTPUT
              echo "package_dir=packages/awx" >> $GITHUB_OUTPUT
              ;;
            github)
              echo "workspace_name=@weiyentan/opencode-plugin-github" >> $GITHUB_OUTPUT
              echo "package_dir=packages/github" >> $GITHUB_OUTPUT
              ;;
            gitlab)
              echo "workspace_name=@weiyentan/opencode-plugin-gitlab" >> $GITHUB_OUTPUT
              echo "package_dir=packages/gitlab" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Error: unknown package" >&2
              exit 1
              ;;
          esac

      - name: Validate package directory exists
        run: |
          if [ ! -d "${{ steps.map.outputs.package_dir }}" ]; then
            echo "Error: Package directory ${{ steps.map.outputs.package_dir }} does not exist" >&2
            exit 1
          fi

      - name: Read version from package.json and derive dist-tag
        id: version
        run: |
          VERSION=$(node -p "require('./${{ steps.map.outputs.package_dir }}/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-experimental.* ]]; then
            DIST_TAG="experimental"
          else
            DIST_TAG="latest"
          fi
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT
          echo "Read version: $VERSION, dist-tag: $DIST_TAG"

      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Build selected workspace
        run: npm run build --workspace="${{ steps.map.outputs.workspace_name }}"

      - name: Test selected workspace
        run: npm test --workspace="${{ steps.map.outputs.workspace_name }}"

      - name: Publish selected workspace
        run: npm publish --workspace="${{ steps.map.outputs.workspace_name }}" --tag="${{ steps.version.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
