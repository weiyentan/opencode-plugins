# CI pipeline for the opencode-plugins monorepo
# Runs lint, test, and build across all workspace packages on push/PR to master.
# Uses path filtering to only trigger on package or workflow changes.

name: CI

on:
  push:
    branches: [master]
    paths:
      - "packages/**"
      - ".github/workflows/**"
      - "package.json"
      - "tsconfig*.json"
      - ".npmrc"
      - "src/**"
      - "tests/**"
  pull_request:
    branches: [master]
    paths:
      - "packages/**"
      - ".github/workflows/**"
      - "package.json"
      - "tsconfig*.json"
      - ".npmrc"
      - "src/**"
      - "tests/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  python-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Python tests
        run: pytest tests/ -v
